<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Applications · Even Infinite admin</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: #0a0c18;
        color: #fff;
        font-family: "Centra No2", "Inter", -apple-system, BlinkMacSystemFont,
          "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }
      button {
        font-family: inherit;
        border: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
      }
      a { color: #5c82ff; text-decoration: none; }

      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 32px 24px 80px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .topbar h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 700;
      }
      .topbar .count {
        margin-left: 10px;
        background: rgba(0, 85, 255, 0.22);
        border: 1px solid rgba(0, 85, 255, 0.6);
        color: #bce5ff;
        font-size: 13px;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 20px;
      }
      .topbar .actions {
        display: flex;
        gap: 8px;
      }
      .topbar .actions button,
      .topbar .actions a {
        background: rgba(157, 188, 255, 0.1);
        border: 1px solid rgba(157, 188, 255, 0.25);
        color: #fff;
        padding: 8px 14px;
        border-radius: 24px;
        font-size: 13px;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .topbar .actions .danger {
        background: rgba(255, 80, 80, 0.12);
        border-color: rgba(255, 80, 80, 0.55);
        color: #ffb3b3;
      }
      .topbar .actions .primary {
        background: #0055ff;
        border-color: #0055ff;
        color: #fff;
      }

      .filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }
      .filter {
        background: rgba(157, 188, 255, 0.08);
        border: 1px solid rgba(157, 188, 255, 0.2);
        color: #fff;
        padding: 6px 12px;
        border-radius: 24px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .filter.active {
        background: rgba(0, 85, 255, 0.3);
        border-color: #0055ff;
      }
      .filter .pill-count {
        opacity: 0.6;
        margin-left: 6px;
        font-weight: 400;
      }

      .search-row {
        margin-bottom: 16px;
      }
      .search-row input {
        width: 100%;
        max-width: 360px;
        height: 38px;
        background: #1a1d3b;
        border: 1px solid rgba(157, 188, 255, 0.2);
        border-radius: 10px;
        color: #fff;
        font-size: 14px;
        padding: 0 14px;
        outline: none;
      }
      .search-row input:focus { border-color: rgba(0, 85, 255, 0.6); }

      .table-wrap {
        background: rgba(20, 22, 38, 0.6);
        border: 1px solid rgba(157, 188, 255, 0.1);
        border-radius: 14px;
        overflow: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      thead th {
        text-align: left;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
        padding: 12px 14px;
        background: rgba(255, 255, 255, 0.03);
        border-bottom: 1px solid rgba(157, 188, 255, 0.12);
      }
      tbody td {
        padding: 12px 14px;
        border-bottom: 1px solid rgba(157, 188, 255, 0.07);
        vertical-align: top;
      }
      tbody tr:last-child td { border-bottom: 0; }

      .status-badge {
        font-size: 11px;
        font-weight: 700;
        padding: 3px 9px;
        border-radius: 20px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
        white-space: nowrap;
      }
      .status-submitted { background: rgba(44,196,139,0.18); color: #5fe2b1; border: 1px solid rgba(44,196,139,0.4); }
      .status-waitlist_city { background: rgba(255,193,7,0.18); color: #ffd166; border: 1px solid rgba(255,193,7,0.45); }
      .status-waitlist_other_insurer { background: rgba(0,85,255,0.18); color: #99b8ff; border: 1px solid rgba(0,85,255,0.5); }

      .tag {
        display: inline-block;
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 20px;
        background: rgba(157, 188, 255, 0.12);
        border: 1px solid rgba(157, 188, 255, 0.18);
        color: #d6e4ff;
        margin: 2px 4px 2px 0;
      }
      .name {
        font-weight: 700;
        font-size: 14px;
      }
      .muted {
        color: rgba(255, 255, 255, 0.5);
        font-size: 12px;
      }

      .empty {
        text-align: center;
        padding: 60px 24px;
        color: rgba(255, 255, 255, 0.55);
      }
      .empty h2 {
        margin: 0 0 6px;
        font-size: 18px;
        font-weight: 700;
        color: #fff;
      }
      .empty a {
        font-weight: 700;
      }

      details.row-expand {
        margin-top: 6px;
      }
      details.row-expand summary {
        cursor: pointer;
        font-size: 12px;
        color: #5c82ff;
        font-weight: 700;
        list-style: none;
      }
      details.row-expand summary::-webkit-details-marker { display: none; }
      details.row-expand[open] summary { color: #99b8ff; }
      details.row-expand pre {
        background: #0e1124;
        border: 1px solid rgba(157, 188, 255, 0.08);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 11.5px;
        line-height: 1.4;
        margin-top: 6px;
        max-height: 320px;
        overflow: auto;
        color: #d6e4ff;
      }

      @media (max-width: 720px) {
        .wrap { padding: 20px 12px 60px; }
        table { font-size: 12px; }
        thead th, tbody td { padding: 8px 10px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <h1>
          Applications
          <span id="totalCount" class="count">0</span>
        </h1>
        <div class="actions">
          <a class="primary" href="index.html">← Back to landing</a>
          <button id="exportBtn" type="button">Export JSON</button>
          <button id="clearBtn" class="danger" type="button">Clear all</button>
        </div>
      </div>

      <div class="filters" id="filters">
        <button class="filter active" data-filter="all">All <span class="pill-count" data-count="all">0</span></button>
        <button class="filter" data-filter="submitted">Submitted <span class="pill-count" data-count="submitted">0</span></button>
        <button class="filter" data-filter="waitlist_city">Waitlist · city <span class="pill-count" data-count="waitlist_city">0</span></button>
        <button class="filter" data-filter="waitlist_other_insurer">Waitlist · insurer <span class="pill-count" data-count="waitlist_other_insurer">0</span></button>
      </div>

      <div class="search-row">
        <input id="searchInput" type="search" placeholder="Search name, mobile, city, insurer…" />
      </div>

      <div id="tableHost"></div>
    </div>

    <script>
      const tableHost = document.getElementById("tableHost");
      const filterButtons = Array.from(
        document.querySelectorAll(".filter[data-filter]")
      );
      const totalCount = document.getElementById("totalCount");
      const searchInput = document.getElementById("searchInput");

      let activeFilter = "all";
      let query = "";

      function load() {
        try {
          return JSON.parse(
            localStorage.getItem("evenApplications") || "[]"
          );
        } catch {
          return [];
        }
      }

      function fmtDate(iso) {
        try {
          const d = new Date(iso);
          return d.toLocaleString();
        } catch {
          return iso;
        }
      }

      function fmtMobile(m) {
        if (!m) return "—";
        const d = m.replace(/\D/g, "");
        if (d.length === 10) return "+91 " + d.slice(0, 5) + " " + d.slice(5);
        return m;
      }

      function statusLabel(s) {
        return (
          {
            submitted: "Submitted",
            waitlist_city: "Waitlist · city",
            waitlist_other_insurer: "Waitlist · insurer",
          }[s] || s
        );
      }

      function safeArr(v) {
        return Array.isArray(v) ? v : [];
      }

      function escapeHtml(s) {
        return String(s ?? "").replace(/[&<>"']/g, (c) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
        })[c]);
      }

      function memberCount(m) {
        const arr = safeArr(m);
        if (!arr.length) return "—";
        if (arr.length === 1 && arr[0]?.primary) return "Just you";
        return arr.length + " (incl. you)";
      }

      function tagList(arr) {
        if (!arr || !arr.length) return '<span class="muted">—</span>';
        return arr
          .map((a) => `<span class="tag">${escapeHtml(a)}</span>`)
          .join("");
      }

      function row(r) {
        const insurersAll = [
          ...safeArr(r.insurers),
          ...safeArr(r.customInsurers),
        ];
        const sourceLabels = safeArr(r.insuranceSource).map((s) =>
          s === "employer" ? "Through employer" : s === "individual" ? "Bought myself" : s
        );

        const detailsJson = escapeHtml(JSON.stringify(r, null, 2));

        return `
          <tr data-id="${escapeHtml(r.id)}">
            <td>
              <div class="name">${escapeHtml(r.name || "—")}</div>
              <div class="muted">${escapeHtml(fmtMobile(r.mobile))}</div>
            </td>
            <td>${escapeHtml(r.city || "—")}</td>
            <td>
              <span class="status-badge status-${escapeHtml(r.status)}">${escapeHtml(statusLabel(r.status))}</span>
            </td>
            <td>${tagList(sourceLabels)}</td>
            <td>${tagList(insurersAll)}</td>
            <td>${escapeHtml(memberCount(r.members))}</td>
            <td>
              <div>${escapeHtml(fmtDate(r.timestamp))}</div>
              <details class="row-expand">
                <summary>View raw</summary>
                <pre>${detailsJson}</pre>
              </details>
            </td>
          </tr>
        `;
      }

      function matchesQuery(r, q) {
        if (!q) return true;
        const lc = q.toLowerCase();
        const hay = [
          r.name,
          r.mobile,
          r.city,
          ...safeArr(r.insurers),
          ...safeArr(r.customInsurers),
          ...safeArr(r.insuranceSource),
          ...safeArr(r.members).map((m) => m?.name || ""),
        ]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();
        return hay.includes(lc);
      }

      function render() {
        const all = load();
        totalCount.textContent = all.length;

        // Update per-filter counts
        const counts = {
          all: all.length,
          submitted: all.filter((r) => r.status === "submitted").length,
          waitlist_city: all.filter((r) => r.status === "waitlist_city").length,
          waitlist_other_insurer: all.filter(
            (r) => r.status === "waitlist_other_insurer"
          ).length,
        };
        document.querySelectorAll("[data-count]").forEach((el) => {
          el.textContent = counts[el.dataset.count] ?? 0;
        });

        let list = all.slice().reverse(); // newest first
        if (activeFilter !== "all") {
          list = list.filter((r) => r.status === activeFilter);
        }
        if (query) {
          list = list.filter((r) => matchesQuery(r, query));
        }

        if (!list.length) {
          tableHost.innerHTML = `
            <div class="empty">
              <h2>No applications yet</h2>
              <p>Walk through the flow at <a href="index.html">the landing page</a> — Submit on the policy step records here.</p>
            </div>
          `;
          return;
        }

        const rows = list.map(row).join("");
        tableHost.innerHTML = `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Applicant</th>
                  <th>City</th>
                  <th>Status</th>
                  <th>Source</th>
                  <th>Insurer(s)</th>
                  <th>Members</th>
                  <th>Captured</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        `;
      }

      filterButtons.forEach((b) => {
        b.addEventListener("click", () => {
          filterButtons.forEach((x) => x.classList.toggle("active", x === b));
          activeFilter = b.dataset.filter;
          render();
        });
      });

      searchInput.addEventListener("input", () => {
        query = searchInput.value.trim();
        render();
      });

      document.getElementById("exportBtn").addEventListener("click", () => {
        const data = JSON.stringify(load(), null, 2);
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const stamp = new Date()
          .toISOString()
          .replace(/[:.]/g, "-")
          .slice(0, 19);
        a.href = url;
        a.download = `even-applications-${stamp}.json`;
        a.click();
        URL.revokeObjectURL(url);
      });

      document.getElementById("clearBtn").addEventListener("click", () => {
        if (!load().length) return;
        if (
          confirm(
            "Delete all stored applications from this device? This can't be undone."
          )
        ) {
          localStorage.removeItem("evenApplications");
          render();
        }
      });

      render();
      // Keep the page fresh if another tab adds an entry
      window.addEventListener("storage", (e) => {
        if (e.key === "evenApplications") render();
      });
    </script>
  
    <!-- Vercel Web Analytics + Speed Insights (auto-served by Vercel on deploy) -->
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
  </body>
</html>
