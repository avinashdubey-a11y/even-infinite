<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Applications · Even Infinite admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #F6F4EE;
        --bg-soft: #FAF8F3;
        --surface: #FFFFFF;
        --surface-tint: #F2EFE7;
        --ink: #0F0E0C;
        --ink-2: #4A4843;
        --ink-3: #8A8780;
        --hairline: rgba(15, 14, 12, 0.08);
        --hairline-soft: rgba(15, 14, 12, 0.04);
        --hairline-strong: rgba(15, 14, 12, 0.14);
        --accent: #1F1D1A;
        --accent-soft: #2C2A26;
        --link: #2E5F4A;

        --st-submitted-bg:  #E4ECDF;
        --st-submitted-ink: #3D6044;
        --st-submitted-edge: rgba(61,96,68,0.32);
        --st-waitlist-city-bg: #F5EAD4;
        --st-waitlist-city-ink: #8A6A2A;
        --st-waitlist-city-edge: rgba(138,106,42,0.3);
        --st-waitlist-insurer-bg: #EFEDE6;
        --st-waitlist-insurer-ink: #6B6A65;
        --st-waitlist-insurer-edge: rgba(15,14,12,0.14);

        --radius-sm: 8px;
        --radius: 12px;
        --radius-lg: 18px;
        --shadow-soft: 0 1px 0 rgba(15,14,12,0.04), 0 8px 24px -16px rgba(15,14,12,0.16);
        --font-sans: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      }

      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font-sans);
        font-size: 14px;
        font-weight: 400;
        letter-spacing: -0.011em;
        font-feature-settings: "cv11" 1, "ss01" 1, "ss03" 1;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100vh;
      }
      button {
        font-family: inherit;
        border: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
      }
      a { color: var(--link); text-decoration: none; }
      a:hover { text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 1px; }

      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 36px 28px 80px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 22px;
      }
      .topbar h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--ink);
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .topbar .count {
        background: var(--surface-tint);
        border: 1px solid var(--hairline);
        color: var(--ink-2);
        font-size: 12.5px;
        font-weight: 500;
        padding: 3px 10px;
        border-radius: 999px;
        font-family: var(--font-mono);
        font-variant-numeric: tabular-nums;
        letter-spacing: 0;
      }
      .topbar .actions {
        display: flex;
        gap: 6px;
      }
      .topbar .actions button,
      .topbar .actions a {
        background: transparent;
        border: 1px solid var(--hairline);
        color: var(--ink);
        padding: 7px 14px;
        border-radius: 999px;
        font-size: 12.5px;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        letter-spacing: -0.005em;
        transition: background 0.18s cubic-bezier(0.32,0.72,0,1), border-color 0.18s, transform 0.12s;
      }
      .topbar .actions button:hover,
      .topbar .actions a:hover {
        background: var(--surface-tint);
        border-color: var(--hairline-strong);
        text-decoration: none;
      }
      .topbar .actions button:active,
      .topbar .actions a:active { transform: scale(0.97); }
      .topbar .actions .danger {
        color: #8C432F;
        border-color: rgba(140,67,47,0.3);
      }
      .topbar .actions .danger:hover {
        background: #F4E1DA;
      }
      .topbar .actions .primary {
        background: var(--ink);
        border-color: var(--ink);
        color: var(--surface);
      }
      .topbar .actions .primary:hover {
        background: var(--accent-soft);
        border-color: var(--accent-soft);
      }

      .filters {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        margin-bottom: 24px;
      }
      .filter {
        background: transparent;
        border: 1px solid transparent;
        color: var(--ink-2);
        padding: 5px 12px;
        border-radius: 999px;
        font-size: 12.5px;
        font-weight: 500;
        cursor: pointer;
        letter-spacing: -0.005em;
        transition: all 0.14s cubic-bezier(0.32,0.72,0,1);
      }
      .filter:hover { background: var(--surface-tint); color: var(--ink); }
      .filter.active {
        background: var(--ink);
        color: var(--surface);
        border-color: var(--ink);
      }
      .filter .pill-count {
        opacity: 0.7;
        margin-left: 6px;
        font-weight: 400;
        font-family: var(--font-mono);
        font-size: 11px;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0;
      }
      .filter.active .pill-count { opacity: 0.85; }

      .search-row {
        margin-bottom: 18px;
      }
      .search-row input {
        width: 100%;
        max-width: 380px;
        height: 38px;
        background: var(--surface);
        border: 1px solid var(--hairline);
        border-radius: var(--radius-sm);
        color: var(--ink);
        font-family: inherit;
        font-size: 13.5px;
        padding: 0 14px;
        outline: none;
        letter-spacing: -0.005em;
        transition: border-color 0.16s, box-shadow 0.16s;
      }
      .search-row input::placeholder { color: var(--ink-3); }
      .search-row input:focus {
        border-color: var(--ink);
        box-shadow: 0 0 0 3px rgba(15,14,12,0.06);
      }

      .table-wrap {
        background: var(--surface);
        border: 1px solid var(--hairline);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow-soft);
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      thead th {
        text-align: left;
        font-size: 10.5px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-3);
        padding: 12px 16px;
        background: var(--bg-soft);
        border-bottom: 1px solid var(--hairline);
      }
      tbody td {
        padding: 13px 16px;
        border-bottom: 1px solid var(--hairline-soft);
        vertical-align: top;
        color: var(--ink);
      }
      tbody tr { transition: background 0.12s; cursor: pointer; }
      tbody tr:hover { background: var(--bg-soft); }
      tbody tr:last-child td { border-bottom: 0; }
      /* Don't bubble pointer cursor into the View raw details */
      tbody tr details.row-expand { cursor: default; }
      tbody tr details.row-expand summary { cursor: pointer; }

      .status-badge {
        font-size: 10.5px;
        font-weight: 600;
        padding: 2.5px 9px;
        border-radius: 999px;
        text-transform: capitalize;
        letter-spacing: -0.003em;
        white-space: nowrap;
        border: 1px solid transparent;
      }
      .status-submitted {
        background: var(--st-submitted-bg);
        color: var(--st-submitted-ink);
        border-color: var(--st-submitted-edge);
      }
      .status-waitlist_city {
        background: var(--st-waitlist-city-bg);
        color: var(--st-waitlist-city-ink);
        border-color: var(--st-waitlist-city-edge);
      }
      .status-waitlist_other_insurer {
        background: var(--st-waitlist-insurer-bg);
        color: var(--st-waitlist-insurer-ink);
        border-color: var(--st-waitlist-insurer-edge);
      }

      .tag {
        display: inline-block;
        font-size: 11.5px;
        padding: 2px 9px;
        border-radius: 999px;
        background: var(--surface-tint);
        border: 1px solid var(--hairline);
        color: var(--ink-2);
        margin: 2px 4px 2px 0;
        letter-spacing: -0.005em;
      }
      .name {
        font-weight: 600;
        font-size: 14px;
        color: var(--ink);
        letter-spacing: -0.015em;
      }
      .muted {
        color: var(--ink-3);
        font-size: 12px;
        font-family: var(--font-mono);
        font-variant-numeric: tabular-nums;
      }

      .empty {
        text-align: center;
        padding: 80px 24px;
        color: var(--ink-3);
      }
      .empty h2 {
        margin: 0 0 8px;
        font-size: 17px;
        font-weight: 600;
        color: var(--ink);
        letter-spacing: -0.015em;
      }
      .empty p {
        margin: 0;
        font-size: 13.5px;
        line-height: 1.55;
        color: var(--ink-2);
      }
      .empty a { font-weight: 500; }

      details.row-expand {
        margin-top: 8px;
      }
      details.row-expand summary {
        cursor: pointer;
        font-size: 11.5px;
        color: var(--link);
        font-weight: 500;
        list-style: none;
        letter-spacing: -0.005em;
      }
      details.row-expand summary::-webkit-details-marker { display: none; }
      details.row-expand[open] summary { color: var(--ink-2); }
      details.row-expand pre {
        background: var(--bg-soft);
        border: 1px solid var(--hairline);
        border-radius: var(--radius-sm);
        padding: 12px 14px;
        font-size: 11.5px;
        font-family: var(--font-mono);
        line-height: 1.5;
        margin-top: 8px;
        max-height: 360px;
        overflow: auto;
        color: var(--ink-2);
      }

      @media (max-width: 720px) {
        .wrap { padding: 22px 14px 60px; }
        table { font-size: 12px; }
        thead th, tbody td { padding: 10px 12px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <h1>
          Applications
          <span id="totalCount" class="count">0</span>
        </h1>
        <div class="actions">
          <a class="primary" href="index.html">← Back to landing</a>
          <a href="coi-verify.html">COI Verification →</a>
          <button id="exportBtn" type="button">Export JSON</button>
          <button id="clearBtn" class="danger" type="button">Clear all</button>
        </div>
      </div>

      <div class="filters" id="filters">
        <button class="filter active" data-filter="all">All <span class="pill-count" data-count="all">0</span></button>
        <button class="filter" data-filter="submitted">Submitted <span class="pill-count" data-count="submitted">0</span></button>
        <button class="filter" data-filter="waitlist_city">Waitlist · city <span class="pill-count" data-count="waitlist_city">0</span></button>
        <button class="filter" data-filter="waitlist_other_insurer">Waitlist · insurer <span class="pill-count" data-count="waitlist_other_insurer">0</span></button>
      </div>

      <div class="search-row">
        <input id="searchInput" type="search" placeholder="Search name, mobile, city, insurer…" />
      </div>

      <div id="tableHost"></div>
    </div>

    <script>
      const tableHost = document.getElementById("tableHost");
      const filterButtons = Array.from(
        document.querySelectorAll(".filter[data-filter]")
      );
      const totalCount = document.getElementById("totalCount");
      const searchInput = document.getElementById("searchInput");

      let activeFilter = "all";
      let query = "";

      function load() {
        try {
          return JSON.parse(
            localStorage.getItem("evenApplications") || "[]"
          );
        } catch {
          return [];
        }
      }

      function fmtDate(iso) {
        try {
          const d = new Date(iso);
          return d.toLocaleString();
        } catch {
          return iso;
        }
      }

      function fmtMobile(m) {
        if (!m) return "—";
        const d = m.replace(/\D/g, "");
        if (d.length === 10) return "+91 " + d.slice(0, 5) + " " + d.slice(5);
        return m;
      }

      function statusLabel(s) {
        return (
          {
            submitted: "Submitted",
            waitlist_city: "Waitlist · city",
            waitlist_other_insurer: "Waitlist · insurer",
          }[s] || s
        );
      }

      function safeArr(v) {
        return Array.isArray(v) ? v : [];
      }

      function escapeHtml(s) {
        return String(s ?? "").replace(/[&<>"']/g, (c) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
        })[c]);
      }

      function memberCount(m) {
        const arr = safeArr(m);
        if (!arr.length) return "—";
        if (arr.length === 1 && arr[0]?.primary) return "Just you";
        return arr.length + " (incl. you)";
      }

      function tagList(arr) {
        if (!arr || !arr.length) return '<span class="muted">—</span>';
        return arr
          .map((a) => `<span class="tag">${escapeHtml(a)}</span>`)
          .join("");
      }

      function row(r) {
        const insurersAll = [
          ...safeArr(r.insurers),
          ...safeArr(r.customInsurers),
        ];
        const sourceLabels = safeArr(r.insuranceSource).map((s) =>
          s === "employer" ? "Through employer" : s === "individual" ? "Bought myself" : s
        );

        const detailsJson = escapeHtml(JSON.stringify(r, null, 2));

        return `
          <tr data-id="${escapeHtml(r.id)}">
            <td>
              <div class="name">${escapeHtml(r.name || "—")}</div>
              <div class="muted">${escapeHtml(fmtMobile(r.mobile))}</div>
            </td>
            <td>${escapeHtml(r.city || "—")}</td>
            <td>
              <span class="status-badge status-${escapeHtml(r.status)}">${escapeHtml(statusLabel(r.status))}</span>
            </td>
            <td>${tagList(sourceLabels)}</td>
            <td>${tagList(insurersAll)}</td>
            <td>${escapeHtml(memberCount(r.members))}</td>
            <td>
              <div>${escapeHtml(fmtDate(r.timestamp))}</div>
              <details class="row-expand">
                <summary>View raw</summary>
                <pre>${detailsJson}</pre>
              </details>
            </td>
          </tr>
        `;
      }

      function matchesQuery(r, q) {
        if (!q) return true;
        const lc = q.toLowerCase();
        const hay = [
          r.name,
          r.mobile,
          r.city,
          ...safeArr(r.insurers),
          ...safeArr(r.customInsurers),
          ...safeArr(r.insuranceSource),
          ...safeArr(r.members).map((m) => m?.name || ""),
        ]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();
        return hay.includes(lc);
      }

      function render() {
        const all = load();
        totalCount.textContent = all.length;

        // Update per-filter counts
        const counts = {
          all: all.length,
          submitted: all.filter((r) => r.status === "submitted").length,
          waitlist_city: all.filter((r) => r.status === "waitlist_city").length,
          waitlist_other_insurer: all.filter(
            (r) => r.status === "waitlist_other_insurer"
          ).length,
        };
        document.querySelectorAll("[data-count]").forEach((el) => {
          el.textContent = counts[el.dataset.count] ?? 0;
        });

        let list = all.slice().reverse(); // newest first
        if (activeFilter !== "all") {
          list = list.filter((r) => r.status === activeFilter);
        }
        if (query) {
          list = list.filter((r) => matchesQuery(r, query));
        }

        if (!list.length) {
          tableHost.innerHTML = `
            <div class="empty">
              <h2>No applications yet</h2>
              <p>Walk through the flow at <a href="index.html">the landing page</a> — Submit on the policy step records here.</p>
            </div>
          `;
          return;
        }

        const rows = list.map(row).join("");
        tableHost.innerHTML = `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Applicant</th>
                  <th>City</th>
                  <th>Status</th>
                  <th>Source</th>
                  <th>Insurer(s)</th>
                  <th>Members</th>
                  <th>Captured</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        `;
      }

      // Row click → open the verify tool deep-linked to this application.
      // Delegated so it survives every render() re-build of the table body.
      tableHost.addEventListener("click", (e) => {
        // Ignore clicks inside <details> (View raw expander)
        if (e.target.closest("details.row-expand")) return;
        const tr = e.target.closest("tr[data-id]");
        if (!tr) return;
        const id = tr.dataset.id;
        if (!id) return;
        window.location.href = `coi-verify.html?id=${encodeURIComponent(id)}`;
      });

      filterButtons.forEach((b) => {
        b.addEventListener("click", () => {
          filterButtons.forEach((x) => x.classList.toggle("active", x === b));
          activeFilter = b.dataset.filter;
          render();
        });
      });

      searchInput.addEventListener("input", () => {
        query = searchInput.value.trim();
        render();
      });

      document.getElementById("exportBtn").addEventListener("click", () => {
        const data = JSON.stringify(load(), null, 2);
        const blob = new Blob([data], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        const stamp = new Date()
          .toISOString()
          .replace(/[:.]/g, "-")
          .slice(0, 19);
        a.href = url;
        a.download = `even-applications-${stamp}.json`;
        a.click();
        URL.revokeObjectURL(url);
      });

      document.getElementById("clearBtn").addEventListener("click", () => {
        if (!load().length) return;
        if (
          confirm(
            "Delete all stored applications from this device? This can't be undone."
          )
        ) {
          localStorage.removeItem("evenApplications");
          render();
        }
      });

      render();
      // Keep the page fresh if another tab adds an entry
      window.addEventListener("storage", (e) => {
        if (e.key === "evenApplications") render();
      });
    </script>
  
    <!-- Vercel Web Analytics + Speed Insights (auto-served by Vercel on deploy) -->
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
  </body>
</html>
