<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Enter OTP — Even Infinite</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        background: #0a0c18;
        color: #fff;
        font-family: "Centra No2", "Inter", -apple-system, BlinkMacSystemFont,
          "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100vh;
        display: flex;
        justify-content: center;
      }

      button,
      input {
        font-family: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        position: relative;
        width: 360px;
        max-width: 100%;
        min-height: 100vh;
        background-image: linear-gradient(180deg, #111547 0%, #02041b 100%);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .head-blob {
        position: absolute;
        top: -60px;
        left: 50%;
        transform: translateX(-50%);
        width: 458px;
        height: 460px;
        pointer-events: none;
        background:
          radial-gradient(
            ellipse 55% 40% at 50% 30%,
            rgba(0, 85, 255, 0.55) 0%,
            rgba(0, 85, 255, 0) 65%
          ),
          radial-gradient(
            ellipse 35% 25% at 30% 45%,
            rgba(92, 130, 255, 0.32) 0%,
            rgba(92, 130, 255, 0) 70%
          ),
          radial-gradient(
            ellipse 30% 22% at 70% 50%,
            rgba(92, 130, 255, 0.28) 0%,
            rgba(92, 130, 255, 0) 70%
          );
        filter: blur(2px);
        z-index: 0;
      }

      /* Status bar */
      .status-bar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px 0;
        z-index: 10;
      }

      .status-time {
        font-weight: 600;
        font-size: 14px;
        line-height: 22px;
        color: #fff;
        letter-spacing: -0.2px;
      }

      .status-levels {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .content {
        position: relative;
        z-index: 1;
        padding: 64px 16px 120px;
        display: flex;
        flex-direction: column;
        gap: 32px;
        flex: 1;
      }

      .top-stack {
        display: flex;
        flex-direction: column;
        gap: 24px;
        width: 100%;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        padding: 6px 0;
        cursor: pointer;
      }

      /* Progress (2 bars, both active on step 2) */
      .progress {
        display: flex;
        gap: 12px;
        width: 100%;
      }

      .progress-bar {
        flex: 1;
        height: 4px;
        border-radius: 20px;
        background: rgba(188, 213, 255, 0.16);
        overflow: hidden;
        position: relative;
      }

      .progress-bar.active {
        background: rgba(188, 213, 255, 0.56);
      }

      .progress-bar.active::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 85, 255, 0.32);
        border-radius: inherit;
      }

      /* Title block */
      .title-block {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .title-block h1 {
        margin: 0;
        font-weight: 700;
        font-size: 20px;
        line-height: 26px;
        color: #fff;
      }

      .title-block p {
        margin: 0;
        font-weight: 400;
        font-size: 14px;
        line-height: 1.4;
        color: rgba(255, 255, 255, 0.56);
      }

      .title-block p strong {
        font-weight: 700;
        color: #fff;
      }

      .change-link {
        color: #5c82ff;
        font-weight: 500;
        cursor: pointer;
      }

      /* OTP inputs */
      .otp-row {
        display: flex;
        gap: 8px;
        width: 100%;
      }

      .otp-input {
        flex: 1;
        aspect-ratio: 1 / 1;
        max-width: 48px;
        background: #212341;
        border: 1px solid transparent;
        border-radius: 12px;
        color: #fff;
        font-weight: 700;
        font-size: 20px;
        text-align: center;
        outline: none;
        transition:
          border-color 0.15s ease,
          background 0.15s ease;
      }

      .otp-input:focus {
        border-color: rgba(0, 85, 255, 0.6);
        background: #1a1d3b;
      }

      .otp-input.filled {
        color: #fff;
      }

      .otp-input.error {
        border-color: #ff4d4d;
      }

      /* Resend row */
      .resend-row {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.56);
      }

      .resend-row .timer {
        color: #5c82ff;
        font-weight: 500;
      }

      .resend-row .resend-active {
        color: #5c82ff;
        font-weight: 500;
        cursor: pointer;
        background: none;
        border: 0;
        padding: 0;
      }

      .resend-row .resend-active[disabled] {
        cursor: default;
        color: rgba(255, 255, 255, 0.56);
        font-weight: 400;
      }

      /* Error banner (visible state for the design's error variant) */
      .error-banner {
        display: none;
        align-items: flex-start;
        gap: 10px;
        padding: 12px 14px;
        background: rgba(255, 80, 80, 0.08);
        border: 1px solid rgba(255, 80, 80, 0.35);
        border-radius: 12px;
        color: #ffb3b3;
        font-size: 13px;
        line-height: 1.4;
      }

      .error-banner.shown {
        display: flex;
      }

      /* Bottom bar */
      .bottom-bar {
        position: sticky;
        bottom: 0;
        left: 0;
        margin-top: auto;
        width: 100%;
        background: #040622;
        z-index: 5;
      }

      .bottom-bar-inner {
        padding: 16px;
      }

      .home-indicator-spacer {
        padding: 16px 16px 8px;
        display: flex;
        justify-content: center;
      }

      .home-indicator {
        width: 132.48px;
        height: 5px;
        background: #000;
        border-radius: 5px;
        opacity: 0;
      }

      .submit-btn {
        width: 100%;
        background: #0055ff;
        border-radius: 32px;
        padding: 11px 20px;
        border: 0;
        color: #fff;
        font-weight: 700;
        font-size: 16px;
        line-height: 1.6;
        cursor: pointer;
        opacity: 0.3;
        transition: opacity 0.18s ease;
      }

      .submit-btn.enabled {
        opacity: 1;
      }

      @media (min-width: 768px) {
        body {
          background:
            radial-gradient(
              ellipse at top,
              rgba(0, 85, 255, 0.08) 0%,
              transparent 50%
            ),
            #0a0c18;
          padding: 24px 0;
        }
        .page {
          box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
          border-radius: 32px;
          min-height: calc(100vh - 48px);
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="head-blob" aria-hidden="true"></div>

      <div class="status-bar" aria-hidden="true">
        <span class="status-time">9:41</span>
        <div class="status-levels">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="none">
            <rect x="0" y="8" width="3" height="4" rx="0.8" fill="white" />
            <rect x="5" y="5" width="3" height="7" rx="0.8" fill="white" />
            <rect x="10" y="2" width="3" height="10" rx="0.8" fill="white" />
            <rect x="15" y="0" width="3" height="12" rx="0.8" fill="white" />
          </svg>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
            <path
              d="M8.5 11.2c.55 0 1-.45 1-1s-.45-1-1-1-1 .45-1 1 .45 1 1 1Zm-3.4-2.6 1.1 1.1A3.3 3.3 0 0 1 8.5 8.7c.86 0 1.66.34 2.3.99l1.1-1.1A4.85 4.85 0 0 0 8.5 7.2c-1.35 0-2.55.52-3.4 1.4Zm-2.2-2.2 1.1 1.1A6.4 6.4 0 0 1 8.5 5.7c1.7 0 3.32.69 4.5 1.8l1.1-1.1A7.97 7.97 0 0 0 8.5 4.2c-2.16 0-4.12.82-5.6 2.2ZM.5 4.3l1.1 1.1A9.45 9.45 0 0 1 8.5 2.7c2.6 0 5.04 1 6.9 2.7l1.1-1.1A10.97 10.97 0 0 0 8.5 1.2C5.36 1.2 2.5 2.42.5 4.3Z"
              fill="white"
            />
          </svg>
          <svg width="27" height="12" viewBox="0 0 27 12" fill="none">
            <rect
              x="0.5"
              y="0.5"
              width="22"
              height="11"
              rx="2.5"
              stroke="white"
              stroke-opacity="0.4"
            />
            <rect x="2" y="2" width="19" height="8" rx="1.5" fill="white" />
            <rect
              x="23.5"
              y="4"
              width="2"
              height="4"
              rx="1"
              fill="white"
              fill-opacity="0.5"
            />
          </svg>
        </div>
      </div>

      <section class="content">
        <div class="top-stack">
          <a class="back-btn" href="details.html" aria-label="Back">
            <svg width="9" height="16" viewBox="0 0 9 16" fill="none">
              <path
                d="M8 1 1 8l7 7"
                stroke="#fff"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </a>

          <div class="progress" aria-hidden="true">
            <span class="progress-bar active"></span>
            <span class="progress-bar active"></span>
          </div>

          <div class="title-block">
            <h1>Enter a 6-digit OTP</h1>
            <p>
              Please enter the verification code we sent to your number on
              <strong id="phoneNumber">+91 90000 00000</strong>.
              <a class="change-link" href="details.html">Change number</a>
            </p>
          </div>
        </div>

        <form id="otpForm" onsubmit="event.preventDefault(); submitOtp();">
          <div
            class="otp-row"
            role="group"
            aria-label="One-time passcode"
          >
            <input
              class="otp-input"
              type="tel"
              maxlength="1"
              inputmode="numeric"
              autocomplete="one-time-code"
              aria-label="Digit 1"
            />
            <input
              class="otp-input"
              type="tel"
              maxlength="1"
              inputmode="numeric"
              aria-label="Digit 2"
            />
            <input
              class="otp-input"
              type="tel"
              maxlength="1"
              inputmode="numeric"
              aria-label="Digit 3"
            />
            <input
              class="otp-input"
              type="tel"
              maxlength="1"
              inputmode="numeric"
              aria-label="Digit 4"
            />
            <input
              class="otp-input"
              type="tel"
              maxlength="1"
              inputmode="numeric"
              aria-label="Digit 5"
            />
            <input
              class="otp-input"
              type="tel"
              maxlength="1"
              inputmode="numeric"
              aria-label="Digit 6"
            />
          </div>

          <div
            class="resend-row"
            style="margin-top: 16px;"
          >
            <span>Didn't get a code?</span>
            <span id="timerText" class="timer">Resend code in 0:23</span>
            <button
              id="resendBtn"
              class="resend-active"
              type="button"
              disabled
              style="display:none"
            >
              Resend code
            </button>
          </div>

          <div
            id="errorBanner"
            class="error-banner"
            style="margin-top: 16px;"
            role="alert"
          >
            Verification code limit reached. Try after 9:43 AM
          </div>
        </form>
      </section>

      <div class="bottom-bar">
        <div class="bottom-bar-inner">
          <button id="submitBtn" class="submit-btn" type="button" disabled>
            Submit
          </button>
        </div>
        <div class="home-indicator-spacer">
          <span class="home-indicator" aria-hidden="true"></span>
        </div>
      </div>
    </main>

    <script>
      // Display the mobile from details.html (stored in sessionStorage)
      const phone = sessionStorage.getItem("evenMobile");
      if (phone) {
        const formatted = phone.replace(/\D/g, "");
        const display =
          formatted.length === 10
            ? "+91 " +
              formatted.slice(0, 5) +
              " " +
              formatted.slice(5)
            : "+91 " + phone;
        document.getElementById("phoneNumber").textContent = display;
      }

      // OTP inputs: auto-advance, paste handling, backspace
      const inputs = Array.from(document.querySelectorAll(".otp-input"));
      const submitBtn = document.getElementById("submitBtn");

      function refreshSubmit() {
        const code = inputs.map((i) => i.value).join("");
        const ok = code.length === 6 && /^\d{6}$/.test(code);
        submitBtn.disabled = !ok;
        submitBtn.classList.toggle("enabled", ok);
      }

      inputs.forEach((input, idx) => {
        input.addEventListener("input", (e) => {
          const v = input.value.replace(/\D/g, "").slice(0, 1);
          input.value = v;
          input.classList.toggle("filled", !!v);
          if (v && idx < inputs.length - 1) inputs[idx + 1].focus();
          refreshSubmit();
        });

        input.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && !input.value && idx > 0) {
            inputs[idx - 1].focus();
            inputs[idx - 1].value = "";
            inputs[idx - 1].classList.remove("filled");
            refreshSubmit();
            e.preventDefault();
          }
          if (e.key === "ArrowLeft" && idx > 0) inputs[idx - 1].focus();
          if (e.key === "ArrowRight" && idx < inputs.length - 1)
            inputs[idx + 1].focus();
        });

        input.addEventListener("paste", (e) => {
          e.preventDefault();
          const text = (e.clipboardData || window.clipboardData)
            .getData("text")
            .replace(/\D/g, "")
            .slice(0, 6);
          for (let i = 0; i < inputs.length; i++) {
            inputs[i].value = text[i] || "";
            inputs[i].classList.toggle("filled", !!text[i]);
          }
          (inputs[Math.min(text.length, 5)] || inputs[5]).focus();
          refreshSubmit();
        });
      });

      // Focus first input on load
      window.addEventListener("load", () => inputs[0].focus());

      // Resend timer
      let seconds = 23;
      const timerText = document.getElementById("timerText");
      const resendBtn = document.getElementById("resendBtn");

      function tick() {
        if (seconds <= 0) {
          timerText.style.display = "none";
          resendBtn.style.display = "inline";
          resendBtn.disabled = false;
          return;
        }
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        timerText.textContent = `Resend code in ${m}:${String(s).padStart(2, "0")}`;
        seconds--;
        setTimeout(tick, 1000);
      }
      tick();

      resendBtn.addEventListener("click", () => {
        seconds = 23;
        resendBtn.style.display = "none";
        timerText.style.display = "inline";
        tick();
      });

      // Submit goes to the insurance source step
      function submitOtp() {
        if (submitBtn.disabled) return;
        window.location.href = "insurance.html";
      }
      submitBtn.addEventListener("click", submitOtp);
    </script>
  </body>
</html>
