<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Enter OTP — Even Infinite</title>
    <style>
      /* === Centra No2 web font family === */
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Hairline.otf") format("opentype"); font-weight: 100; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-HairlineItalic.otf") format("opentype"); font-weight: 100; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Thin.otf") format("opentype"); font-weight: 200; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-ThinItalic.otf") format("opentype"); font-weight: 200; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Light.otf") format("opentype"); font-weight: 300; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-LightItalic.otf") format("opentype"); font-weight: 300; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Book.otf") format("opentype"); font-weight: 400; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-BookItalic.otf") format("opentype"); font-weight: 400; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Medium.otf") format("opentype"); font-weight: 500; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-MediumItalic.otf") format("opentype"); font-weight: 500; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Bold.otf") format("opentype"); font-weight: 700; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-BoldItalic.otf") format("opentype"); font-weight: 700; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Extrabold.otf") format("opentype"); font-weight: 800; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-ExtraboldItalic.otf") format("opentype"); font-weight: 800; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Black.otf") format("opentype"); font-weight: 900; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-BlackItalic.otf") format("opentype"); font-weight: 900; font-style: italic; font-display: swap; }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        background: #0a0c18;
        color: #fff;
        font-family: "Centra No2", "Inter", -apple-system, BlinkMacSystemFont,
          "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100vh;
        display: flex;
        justify-content: center;
      }

      button,
      input {
        font-family: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        position: relative;
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        background-image: linear-gradient(180deg, #111547 0%, #02041b 100%);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .head-blob {
        position: absolute;
        top: -60px;
        left: 50%;
        transform: translateX(-50%);
        width: 458px;
        height: 460px;
        pointer-events: none;
        background:
          radial-gradient(
            ellipse 55% 40% at 50% 30%,
            rgba(0, 85, 255, 0.55) 0%,
            rgba(0, 85, 255, 0) 65%
          ),
          radial-gradient(
            ellipse 35% 25% at 30% 45%,
            rgba(92, 130, 255, 0.32) 0%,
            rgba(92, 130, 255, 0) 70%
          ),
          radial-gradient(
            ellipse 30% 22% at 70% 50%,
            rgba(92, 130, 255, 0.28) 0%,
            rgba(92, 130, 255, 0) 70%
          );
        filter: blur(2px);
        z-index: 0;
      }

      /* Status bar */
      .status-bar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px 0;
        z-index: 10;
      }

      .status-time {
        font-weight: 600;
        font-size: 14px;
        line-height: 22px;
        color: #fff;
        letter-spacing: -0.2px;
      }

      .status-levels {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .content {
        position: relative;
        z-index: 1;
        padding: 24px 16px 120px;
        display: flex;
        flex-direction: column;
        gap: 32px;
        flex: 1;
      }

      .top-stack {
        display: flex;
        flex-direction: column;
        gap: 24px;
        width: 100%;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        padding: 6px 0;
        cursor: pointer;
      }

      /* Progress (2 bars, both active on step 2) */
      .progress {
        display: flex;
        gap: 12px;
        width: 100%;
      }

      .progress-bar {
        flex: 1;
        height: 4px;
        border-radius: 20px;
        background: rgba(188, 213, 255, 0.16);
        overflow: hidden;
        position: relative;
      }

      .progress-bar.active {
        background: rgba(188, 213, 255, 0.56);
      }

      .progress-bar.active::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 85, 255, 0.32);
        border-radius: inherit;
      }

      /* Title block */
      .title-block {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .title-block h1 {
        margin: 0;
        font-weight: 700;
        font-size: 20px;
        line-height: 26px;
        color: #fff;
      }

      .title-block p {
        margin: 0;
        font-weight: 400;
        font-size: 14px;
        line-height: 1.4;
        color: rgba(255, 255, 255, 0.56);
      }

      .title-block p strong {
        font-weight: 700;
        color: #fff;
      }

      .change-link {
        color: #5c82ff;
        font-weight: 500;
        cursor: pointer;
      }

      /* OTP inputs */
      .otp-row {
        display: flex;
        gap: 8px;
        width: 100%;
      }

      .otp-input {
        flex: 1;
        aspect-ratio: 1 / 1;
        max-width: 48px;
        background: #212341;
        border: 1px solid transparent;
        border-radius: 12px;
        color: #fff;
        font-weight: 700;
        font-size: 20px;
        text-align: center;
        outline: none;
        transition:
          border-color 0.15s ease,
          background 0.15s ease;
      }

      .otp-input:focus {
        border-color: rgba(0, 85, 255, 0.6);
        background: #1a1d3b;
      }

      .otp-input.filled {
        color: #fff;
      }

      .otp-input.error {
        border-color: #ff4d4d;
      }

      /* Resend row */
      .resend-row {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.56);
      }

      .resend-row .timer {
        color: #5c82ff;
        font-weight: 500;
      }

      .resend-row .resend-active {
        color: #5c82ff;
        font-weight: 500;
        cursor: pointer;
        background: none;
        border: 0;
        padding: 0;
      }

      .resend-row .resend-active[disabled] {
        cursor: default;
        color: rgba(255, 255, 255, 0.56);
        font-weight: 400;
      }

      /* Error banner (visible state for the design's error variant) */
      .error-banner {
        display: none;
        align-items: flex-start;
        gap: 10px;
        padding: 12px 14px;
        background: rgba(255, 80, 80, 0.08);
        border: 1px solid rgba(255, 80, 80, 0.35);
        border-radius: 12px;
        color: #ffb3b3;
        font-size: 13px;
        line-height: 1.4;
      }

      .error-banner.shown {
        display: flex;
      }

      /* Bottom bar */
      .bottom-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        width: auto;
        background: #040622;
        z-index: 50;
      }

      .bottom-bar-inner {
        padding: 16px;
      }

      .home-indicator-spacer {
        padding: 16px 16px 8px;
        display: flex;
        justify-content: center;
      }

      .home-indicator {
        width: 132.48px;
        height: 5px;
        background: #000;
        border-radius: 5px;
        opacity: 0;
      }

      .submit-btn {
        width: 100%;
        background: #0055ff;
        border-radius: 32px;
        padding: 11px 20px;
        border: 0;
        color: #fff;
        font-weight: 700;
        font-size: 16px;
        line-height: 1.6;
        cursor: pointer;
        opacity: 0.3;
        transition: opacity 0.18s ease;
      }

      .submit-btn.enabled {
        opacity: 1;
      }

      @media (min-width: 768px) {
        body {
          background:
            radial-gradient(
              ellipse at top,
              rgba(0, 85, 255, 0.08) 0%,
              transparent 50%
            ),
            #0a0c18;
          padding: 24px 0;
        .bottom-bar {
          left: 50%;
          right: auto;
          width: 360px;
          transform: translateX(-50%);
        }
      
        }
        .page {
          width: 360px;
          max-width: 360px;
          box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
          border-radius: 32px;
          min-height: calc(100vh - 48px);
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="head-blob" aria-hidden="true"></div>
      </div>

      <section class="content">
        <div class="top-stack">
          <a class="back-btn" href="details.html" aria-label="Back">
            <svg width="9" height="16" viewBox="0 0 9 16" fill="none">
              <path
                d="M8 1 1 8l7 7"
                stroke="#fff"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </a>

          <div class="progress" aria-hidden="true">
            <span class="progress-bar active"></span>
            <span class="progress-bar active"></span>
          </div>

          <div class="title-block">
            <h1>Enter a 6-digit OTP</h1>
            <p>
              Please enter the verification code we sent to your number on
              <strong id="phoneNumber">+91 90000 00000</strong>.
              <a class="change-link" href="details.html">Change number</a>
            </p>
          </div>
        </div>

        <form id="otpForm" onsubmit="event.preventDefault(); submitOtp();">
          <div
            class="otp-row"
            role="group"
            aria-label="One-time passcode"
          >
            <input
              class="otp-input"
              type="tel"
              maxlength="1"
              inputmode="numeric"
              autocomplete="one-time-code"
              aria-label="Digit 1"
            />
            <input
              class="otp-input"
              type="tel"
              maxlength="1"
              inputmode="numeric"
              aria-label="Digit 2"
            />
            <input
              class="otp-input"
              type="tel"
              maxlength="1"
              inputmode="numeric"
              aria-label="Digit 3"
            />
            <input
              class="otp-input"
              type="tel"
              maxlength="1"
              inputmode="numeric"
              aria-label="Digit 4"
            />
            <input
              class="otp-input"
              type="tel"
              maxlength="1"
              inputmode="numeric"
              aria-label="Digit 5"
            />
            <input
              class="otp-input"
              type="tel"
              maxlength="1"
              inputmode="numeric"
              aria-label="Digit 6"
            />
          </div>

          <div
            class="resend-row"
            style="margin-top: 16px;"
          >
            <span>Didn't get a code?</span>
            <span id="timerText" class="timer">Resend code in 0:23</span>
            <button
              id="resendBtn"
              class="resend-active"
              type="button"
              disabled
              style="display:none"
            >
              Resend code
            </button>
          </div>

          <div
            id="errorBanner"
            class="error-banner"
            style="margin-top: 16px;"
            role="alert"
          >
            Verification code limit reached. Try after 9:43 AM
          </div>
        </form>
      </section>

      <div class="bottom-bar">
        <div class="bottom-bar-inner">
          <button id="submitBtn" class="submit-btn" type="button" disabled>
            Submit
          </button>
        </div>
        <div class="home-indicator-spacer">
          <span class="home-indicator" aria-hidden="true"></span>
        </div>
      </div>
    </main>

    <script>
      // Display the mobile from details.html (stored in sessionStorage)
      const phone = sessionStorage.getItem("evenMobile");
      if (phone) {
        const formatted = phone.replace(/\D/g, "");
        const display =
          formatted.length === 10
            ? "+91 " +
              formatted.slice(0, 5) +
              " " +
              formatted.slice(5)
            : "+91 " + phone;
        document.getElementById("phoneNumber").textContent = display;
      }

      // OTP inputs: auto-advance, paste handling, backspace
      const inputs = Array.from(document.querySelectorAll(".otp-input"));
      const submitBtn = document.getElementById("submitBtn");

      function refreshSubmit() {
        const code = inputs.map((i) => i.value).join("");
        const ok = code.length === 6 && /^\d{6}$/.test(code);
        submitBtn.disabled = !ok;
        submitBtn.classList.toggle("enabled", ok);
      }

      inputs.forEach((input, idx) => {
        input.addEventListener("input", (e) => {
          const v = input.value.replace(/\D/g, "").slice(0, 1);
          input.value = v;
          input.classList.toggle("filled", !!v);
          if (v && idx < inputs.length - 1) inputs[idx + 1].focus();
          refreshSubmit();
        });

        input.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && !input.value && idx > 0) {
            inputs[idx - 1].focus();
            inputs[idx - 1].value = "";
            inputs[idx - 1].classList.remove("filled");
            refreshSubmit();
            e.preventDefault();
          }
          if (e.key === "ArrowLeft" && idx > 0) inputs[idx - 1].focus();
          if (e.key === "ArrowRight" && idx < inputs.length - 1)
            inputs[idx + 1].focus();
        });

        input.addEventListener("paste", (e) => {
          e.preventDefault();
          const text = (e.clipboardData || window.clipboardData)
            .getData("text")
            .replace(/\D/g, "")
            .slice(0, 6);
          for (let i = 0; i < inputs.length; i++) {
            inputs[i].value = text[i] || "";
            inputs[i].classList.toggle("filled", !!text[i]);
          }
          (inputs[Math.min(text.length, 5)] || inputs[5]).focus();
          refreshSubmit();
        });
      });

      // Focus first input on load
      window.addEventListener("load", () => inputs[0].focus());

      // Resend timer
      let seconds = 23;
      const timerText = document.getElementById("timerText");
      const resendBtn = document.getElementById("resendBtn");

      function tick() {
        if (seconds <= 0) {
          timerText.style.display = "none";
          resendBtn.style.display = "inline";
          resendBtn.disabled = false;
          return;
        }
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        timerText.textContent = `Resend code in ${m}:${String(s).padStart(2, "0")}`;
        seconds--;
        setTimeout(tick, 1000);
      }
      tick();

      resendBtn.addEventListener("click", () => {
        seconds = 23;
        resendBtn.style.display = "none";
        timerText.style.display = "inline";
        tick();
      });

      // Submit goes to the insurance source step
      function submitOtp() {
        if (submitBtn.disabled) return;
        window.location.href = "insurance.html";
      }
      submitBtn.addEventListener("click", submitOtp);
    </script>
  </body>
</html>
