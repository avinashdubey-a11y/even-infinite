<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Not available yet — Even Infinite</title>
    <style>
      /* === Centra No2 web font family === */
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Hairline.otf") format("opentype"); font-weight: 100; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-HairlineItalic.otf") format("opentype"); font-weight: 100; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Thin.otf") format("opentype"); font-weight: 200; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-ThinItalic.otf") format("opentype"); font-weight: 200; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Light.otf") format("opentype"); font-weight: 300; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-LightItalic.otf") format("opentype"); font-weight: 300; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Book.otf") format("opentype"); font-weight: 400; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-BookItalic.otf") format("opentype"); font-weight: 400; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Medium.otf") format("opentype"); font-weight: 500; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-MediumItalic.otf") format("opentype"); font-weight: 500; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Bold.otf") format("opentype"); font-weight: 700; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-BoldItalic.otf") format("opentype"); font-weight: 700; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Extrabold.otf") format("opentype"); font-weight: 800; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-ExtraboldItalic.otf") format("opentype"); font-weight: 800; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Black.otf") format("opentype"); font-weight: 900; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-BlackItalic.otf") format("opentype"); font-weight: 900; font-style: italic; font-display: swap; }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        background: #0a0c18;
        color: #fff;
        font-family: "Centra No2", "Inter", -apple-system, BlinkMacSystemFont,
          "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100vh;
        display: flex;
        justify-content: center;
      }

      button {
        font-family: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        position: relative;
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        background-image: linear-gradient(180deg, #111547 0%, #02041b 100%);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* Dimmed faux form behind the modal */
      .faux-form {
        position: absolute;
        inset: 64px 16px auto 16px;
        z-index: 0;
        opacity: 0.35;
        filter: blur(1px);
        pointer-events: none;
      }

      .faux-form .row {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
      }

      .faux-form .lbl {
        width: 120px;
        height: 10px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 4px;
      }

      .faux-form .inp {
        height: 48px;
        background: #212341;
        border-radius: 12px;
      }

      .head-blob {
        position: absolute;
        top: -60px;
        left: 50%;
        transform: translateX(-50%);
        width: 458px;
        height: 460px;
        pointer-events: none;
        background:
          radial-gradient(
            ellipse 55% 40% at 50% 30%,
            rgba(0, 85, 255, 0.55) 0%,
            rgba(0, 85, 255, 0) 65%
          ),
          radial-gradient(
            ellipse 35% 25% at 30% 45%,
            rgba(92, 130, 255, 0.32) 0%,
            rgba(92, 130, 255, 0) 70%
          );
        filter: blur(2px);
        z-index: 0;
      }

      /* Status bar */
      .status-bar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px 0;
        z-index: 10;
      }

      .status-time {
        font-weight: 600;
        font-size: 14px;
        line-height: 22px;
        color: #fff;
        letter-spacing: -0.2px;
      }

      .status-levels {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* Overlay dim */
      .overlay {
        position: absolute;
        inset: 0;
        background: rgba(2, 4, 27, 0.55);
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
        z-index: 2;
      }

      /* Modal sheet */
      .sheet {
        position: relative;
        z-index: 3;
        margin: auto 16px 24px;
        background: #fff;
        border-radius: 20px;
        padding: 24px 20px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        color: #111;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      }

      .sheet-illustration {
        width: 96px;
        height: 96px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .sheet-illustration svg {
        width: 100%;
        height: 100%;
      }

      .sheet h2 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        line-height: 1.3;
        color: #111;
        text-align: center;
      }

      .sheet p {
        margin: 0;
        font-size: 14px;
        font-weight: 400;
        line-height: 1.4;
        color: #555;
        text-align: center;
      }

      .sheet p strong {
        color: #111;
        font-weight: 700;
      }

      .sheet-actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 100%;
        margin-top: 4px;
      }

      .btn-primary {
        width: 100%;
        background: #0055ff;
        color: #fff;
        border: 0;
        border-radius: 32px;
        padding: 11px 20px;
        font-weight: 700;
        font-size: 16px;
        line-height: 1.6;
        cursor: pointer;
      }

      .btn-link {
        background: none;
        border: 0;
        padding: 10px;
        color: #0055ff;
        font-weight: 700;
        font-size: 14px;
        line-height: 1.5;
        cursor: pointer;
        text-align: center;
      }

      .home-indicator-spacer {
        padding: 0 16px 8px;
        display: flex;
        justify-content: center;
      }

      .home-indicator {
        width: 132.48px;
        height: 5px;
        background: #000;
        border-radius: 5px;
        opacity: 0;
      }

      /* Toast for the "Notify me" tap */
      .toast {
        position: fixed;
        left: 50%;
        bottom: 32px;
        transform: translate(-50%, 20px);
        background: rgba(20, 22, 38, 0.95);
        color: #fff;
        font-size: 13px;
        padding: 10px 16px;
        border-radius: 24px;
        border: 1px solid rgba(157, 188, 255, 0.2);
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.25s ease,
          transform 0.25s ease;
        z-index: 50;
      }

      .toast.shown {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      @media (min-width: 768px) {
        body {
          background:
            radial-gradient(
              ellipse at top,
              rgba(0, 85, 255, 0.08) 0%,
              transparent 50%
            ),
            #0a0c18;
          padding: 24px 0;
        }
        .page {
          width: 360px;
          max-width: 360px;
          box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
          border-radius: 32px;
          min-height: calc(100vh - 48px);
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="head-blob" aria-hidden="true"></div>

      <!-- Status bar -->
      </div>

      <!-- Faux form behind -->
      <div class="faux-form" aria-hidden="true">
        <div class="row">
          <span class="lbl"></span><span class="inp"></span>
        </div>
        <div class="row">
          <span class="lbl"></span><span class="inp"></span>
        </div>
        <div class="row">
          <span class="lbl"></span><span class="inp"></span>
        </div>
      </div>

      <!-- Dim overlay -->
      <div class="overlay" aria-hidden="true"></div>

      <!-- Modal sheet -->
      <section class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
        <div class="sheet-illustration" aria-hidden="true">
          <!-- Pin + ground illustration -->
          <svg viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="48" cy="80" rx="32" ry="6" fill="#EAF0FF" />
            <path
              d="M48 14c-11.6 0-21 9.4-21 21 0 14.5 18.2 33 20.2 35a1 1 0 0 0 1.5 0c2-2 20.3-20.5 20.3-35 0-11.6-9.4-21-21-21Z"
              fill="#0055FF"
            />
            <path
              d="M48 14c-11.6 0-21 9.4-21 21 0 14.5 18.2 33 20.2 35a1 1 0 0 0 1.5 0c2-2 20.3-20.5 20.3-35 0-11.6-9.4-21-21-21Z"
              fill="url(#sheen)"
              fill-opacity="0.25"
            />
            <circle cx="48" cy="34" r="8" fill="#fff" />
            <circle cx="48" cy="34" r="3.5" fill="#0055FF" />
            <defs>
              <linearGradient
                id="sheen"
                x1="48"
                y1="14"
                x2="48"
                y2="70"
                gradientUnits="userSpaceOnUse"
              >
                <stop stop-color="#fff" />
                <stop offset="1" stop-color="#fff" stop-opacity="0" />
              </linearGradient>
            </defs>
          </svg>
        </div>

        <h2 id="sheetTitle">We are not available in your city yet</h2>
        <p>
          We're not live in
          <strong id="cityName">your city</strong> yet. Leave us your details
          and we'll let you know the moment Even Infinite arrives.
        </p>

        <div class="sheet-actions">
          <button id="changeBtn" class="btn-primary" type="button">
            Change location
          </button>
          <button id="notifyBtn" class="btn-link" type="button">
            Notify me when available
          </button>
        </div>
      </section>

      <div class="home-indicator-spacer">
        <span class="home-indicator" aria-hidden="true"></span>
      </div>
    </main>

    <div id="toast" class="toast" role="status">
      Got it — we'll let you know.
    </div>

    <script>
      const city = sessionStorage.getItem("evenCity");
      if (city) document.getElementById("cityName").textContent = city;

      document
        .getElementById("changeBtn")
        .addEventListener("click", () => {
          window.location.href = "details.html";
        });

      const toast = document.getElementById("toast");
      document
        .getElementById("notifyBtn")
        .addEventListener("click", () => {
          toast.classList.add("shown");
          setTimeout(() => {
            toast.classList.remove("shown");
            setTimeout(() => (window.location.href = "index.html"), 350);
          }, 1500);
        });
    </script>
  
    <!-- Vercel Web Analytics + Speed Insights (auto-served by Vercel on deploy) -->
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
  </body>
</html>
