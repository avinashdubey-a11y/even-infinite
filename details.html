<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Your details — Even Infinite</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        background: #0a0c18;
        color: #fff;
        font-family: "Centra No2", "Inter", -apple-system, BlinkMacSystemFont,
          "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100vh;
        display: flex;
        justify-content: center;
      }

      button,
      input {
        font-family: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      /* Phone frame */
      .page {
        position: relative;
        width: 360px;
        max-width: 100%;
        min-height: 100vh;
        background-image: linear-gradient(180deg, #111547 0%, #02041b 100%);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      /* Decorative top glow blob */
      .head-blob {
        position: absolute;
        top: -60px;
        left: 50%;
        transform: translateX(-50%);
        width: 458px;
        height: 460px;
        pointer-events: none;
        background:
          radial-gradient(
            ellipse 55% 40% at 50% 30%,
            rgba(0, 85, 255, 0.55) 0%,
            rgba(0, 85, 255, 0) 65%
          ),
          radial-gradient(
            ellipse 35% 25% at 30% 45%,
            rgba(92, 130, 255, 0.32) 0%,
            rgba(92, 130, 255, 0) 70%
          ),
          radial-gradient(
            ellipse 30% 22% at 70% 50%,
            rgba(92, 130, 255, 0.28) 0%,
            rgba(92, 130, 255, 0) 70%
          );
        filter: blur(2px);
        z-index: 0;
      }

      /* Status bar */
      .status-bar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px 0;
        z-index: 10;
      }

      .status-time {
        font-weight: 600;
        font-size: 14px;
        line-height: 22px;
        color: #fff;
        letter-spacing: -0.2px;
      }

      .status-levels {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* Page content */
      .content {
        position: relative;
        z-index: 1;
        padding: 64px 16px 120px;
        display: flex;
        flex-direction: column;
        gap: 32px;
        flex: 1;
      }

      /* Top stack: back, progress, title block */
      .top-stack {
        display: flex;
        flex-direction: column;
        gap: 24px;
        width: 100%;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        padding: 6px 0;
        cursor: pointer;
      }

      /* Progress (2 bars) */
      .progress {
        display: flex;
        gap: 12px;
        width: 100%;
      }

      .progress-bar {
        flex: 1;
        height: 4px;
        border-radius: 20px;
        background: rgba(188, 213, 255, 0.16);
        overflow: hidden;
        position: relative;
      }

      .progress-bar.active {
        background: rgba(188, 213, 255, 0.56);
      }

      .progress-bar.active::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 85, 255, 0.32);
        border-radius: inherit;
      }

      /* Title block */
      .title-block {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .title-block h1 {
        margin: 0;
        font-weight: 700;
        font-size: 20px;
        line-height: 26px;
        color: #fff;
      }

      .title-block p {
        margin: 0;
        font-weight: 400;
        font-size: 14px;
        line-height: 1.4;
        color: rgba(255, 255, 255, 0.56);
      }

      /* Form */
      .form {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .field-label {
        font-weight: 400;
        font-size: 14px;
        line-height: 1.4;
        color: #fff;
      }

      .field-input {
        height: 48px;
        background: #212341;
        border-radius: 12px;
        border: 0;
        padding: 8px 16px;
        color: #fff;
        font-weight: 700;
        font-size: 14px;
        line-height: 1.4;
        outline: none;
        width: 100%;
      }

      .field-input::placeholder {
        color: #999;
        font-weight: 400;
      }

      .field-input:focus {
        outline: 1px solid rgba(0, 85, 255, 0.5);
      }

      .city-field {
        gap: 12px;
      }

      .locate-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: #5c82ff;
        font-weight: 500;
        font-size: 14px;
        line-height: 1.4;
        cursor: pointer;
      }

      /* Sticky bottom bar */
      .bottom-bar {
        position: sticky;
        bottom: 0;
        left: 0;
        margin-top: auto;
        width: 100%;
        background: #040622;
        z-index: 5;
      }

      .bottom-bar-inner {
        padding: 16px;
      }

      .home-indicator-spacer {
        padding: 16px 16px 8px;
        display: flex;
        justify-content: center;
      }

      .home-indicator {
        width: 132.48px;
        height: 5px;
        background: #000;
        border-radius: 5px;
        opacity: 0;
      }

      .continue-btn {
        width: 100%;
        background: #0055ff;
        border-radius: 32px;
        padding: 11px 20px;
        border: 0;
        color: #fff;
        font-weight: 700;
        font-size: 16px;
        line-height: 1.6;
        cursor: pointer;
        opacity: 0.3;
        transition: opacity 0.18s ease;
      }

      .continue-btn.enabled {
        opacity: 1;
        cursor: pointer;
      }

      /* ============== Not-available modal ============== */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(2, 4, 27, 0.55);
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 24px;
      }

      .modal-overlay.shown {
        display: flex;
      }

      .modal-sheet {
        position: relative;
        width: 100%;
        max-width: 296px;
        background: #fff;
        color: #111;
        border-radius: 20px;
        padding: 24px 20px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
        animation: modalIn 0.18s ease-out both;
      }

      @keyframes modalIn {
        from {
          opacity: 0;
          transform: translateY(8px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .modal-illustration {
        width: 96px;
        height: 96px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .modal-illustration svg {
        width: 100%;
        height: 100%;
      }

      .modal-title {
        margin: 0;
        font-size: 17px;
        font-weight: 700;
        line-height: 1.3;
        color: #111;
        text-align: center;
      }

      .modal-body {
        margin: 0;
        font-size: 13px;
        font-weight: 400;
        line-height: 1.45;
        color: #555;
        text-align: center;
      }

      .modal-body strong {
        color: #111;
        font-weight: 700;
      }

      .modal-actions {
        display: flex;
        flex-direction: column;
        gap: 4px;
        width: 100%;
        margin-top: 8px;
      }

      .modal-btn-primary {
        width: 100%;
        background: #0055ff;
        color: #fff;
        border: 0;
        border-radius: 24px;
        padding: 11px 16px;
        font-weight: 700;
        font-size: 15px;
        line-height: 1.5;
        cursor: pointer;
      }

      .modal-btn-link {
        background: none;
        border: 0;
        padding: 10px;
        color: #0055ff;
        font-weight: 700;
        font-size: 14px;
        line-height: 1.5;
        cursor: pointer;
      }

      /* Toast */
      .toast {
        position: fixed;
        left: 50%;
        bottom: 32px;
        transform: translate(-50%, 20px);
        background: rgba(20, 22, 38, 0.95);
        color: #fff;
        font-size: 13px;
        padding: 10px 16px;
        border-radius: 24px;
        border: 1px solid rgba(157, 188, 255, 0.2);
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.25s ease,
          transform 0.25s ease;
        z-index: 2000;
      }

      .toast.shown {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      @media (min-width: 768px) {
        body {
          background:
            radial-gradient(
              ellipse at top,
              rgba(0, 85, 255, 0.08) 0%,
              transparent 50%
            ),
            #0a0c18;
          padding: 24px 0;
        }
        .page {
          box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
          border-radius: 32px;
          min-height: calc(100vh - 48px);
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="head-blob" aria-hidden="true"></div>

      <!-- Status bar -->
      <div class="status-bar" aria-hidden="true">
        <span class="status-time">9:41</span>
        <div class="status-levels">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="none">
            <rect x="0" y="8" width="3" height="4" rx="0.8" fill="white" />
            <rect x="5" y="5" width="3" height="7" rx="0.8" fill="white" />
            <rect x="10" y="2" width="3" height="10" rx="0.8" fill="white" />
            <rect x="15" y="0" width="3" height="12" rx="0.8" fill="white" />
          </svg>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
            <path

              fill="white"
            />
          </svg>
          <svg width="27" height="12" viewBox="0 0 27 12" fill="none">
            <rect
              x="0.5"
              y="0.5"
              width="22"
              height="11"
              rx="2.5"
              stroke="white"
              stroke-opacity="0.4"
            />
            <rect x="2" y="2" width="19" height="8" rx="1.5" fill="white" />
            <rect
              x="23.5"
              y="4"
              width="2"
              height="4"
              rx="1"
              fill="white"
              fill-opacity="0.5"
            />
          </svg>
        </div>
      </div>

      <!-- Page content -->
      <section class="content">
        <div class="top-stack">
          <a class="back-btn" href="index.html" aria-label="Back">
            <svg width="9" height="16" viewBox="0 0 9 16" fill="none">
              <path
                d="M8 1 1 8l7 7"
                stroke="#fff"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </a>

          <div class="progress" aria-hidden="true">
            <span class="progress-bar active"></span>
            <span class="progress-bar"></span>
          </div>

          <div class="title-block">
            <h1>Your details</h1>
            <p>
              Your data stays private. We only use your details to verify your
              eligibility.
            </p>
          </div>
        </div>

        <form class="form" onsubmit="event.preventDefault();">
          <div class="field">
            <label class="field-label" for="name">
              Name (as on your Insurance)
            </label>
            <input
              id="name"
              class="field-input"
              type="text"
              placeholder="Enter here"
              autocomplete="name"
            />
          </div>

          <div class="field">
            <label class="field-label" for="mobile">Mobile number</label>
            <input
              id="mobile"
              class="field-input"
              type="tel"
              placeholder="Enter here"
              inputmode="numeric"
              autocomplete="tel"
            />
          </div>

          <div class="field city-field">
            <label class="field-label" for="city">City</label>
            <input
              id="city"
              class="field-input"
              type="text"
              value="Bengaluru"
            />

            <a class="locate-link" href="#">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path
                  d="M12 21s7-6.5 7-12a7 7 0 1 0-14 0c0 5.5 7 12 7 12Z"
                  stroke="#5C82FF"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <circle
                  cx="12"
                  cy="9"
                  r="2.5"
                  stroke="#5C82FF"
                  stroke-width="1.5"
                />
              </svg>
              Use current location
            </a>
          </div>
        </form>
      </section>

      <!-- Bottom sticky bar -->
      <div class="bottom-bar">
        <div class="bottom-bar-inner">
          <button id="continueBtn" class="continue-btn" type="button" disabled>
            Continue
          </button>
        </div>
        <div class="home-indicator-spacer">
          <span class="home-indicator" aria-hidden="true"></span>
        </div>
      </div>
    </main>

        </div>

        <h2 id="notAvailTitle" class="modal-title">
          We are not available in your city yet
        </h2>
        <p class="modal-body">
          We're not live in <strong id="cityNameLabel">your city</strong> yet.
          Want us to let you know the moment Even Infinite arrives?
        </p>

        <div class="modal-actions">
          <button id="changeLocationBtn" class="modal-btn-primary" type="button">
            Change location
          </button>
          <button id="notifyBtn" class="modal-btn-link" type="button">
            Notify me when available
          </button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" role="status">
      Got it — we'll let you know.
    </div>

    <script>
      const name = document.getElementById("name");
      const mobile = document.getElementById("mobile");
      const city = document.getElementById("city");
      const btn = document.getElementById("continueBtn");

      // restore values if user came back from OTP
      name.value = sessionStorage.getItem("evenName") || "";
      mobile.value = sessionStorage.getItem("evenMobile") || "";
      const storedCity = sessionStorage.getItem("evenCity");
      if (storedCity) city.value = storedCity;

      function refresh() {
        const ok =
          name.value.trim().length > 0 && mobile.value.trim().length >= 10;
        btn.disabled = !ok;
        btn.classList.toggle("enabled", ok);
      }
      name.addEventListener("input", refresh);
      mobile.addEventListener("input", () => {
        // keep digits only
        mobile.value = mobile.value.replace(/\D/g, "").slice(0, 10);
        refresh();
      });
      refresh();

      const modal = document.getElementById("notAvailableModal");
      const cityLabel = document.getElementById("cityNameLabel");
      const toast = document.getElementById("toast");

      function isBengaluru(v) {
        const c = (v || "").trim().toLowerCase();
        return c === "bengaluru" || c === "bangalore";
      }

      function openModal(cityName) {
        cityLabel.textContent = cityName || "your city";
        modal.classList.add("shown");
        document.body.style.overflow = "hidden";
      }
      function closeModal() {
        modal.classList.remove("shown");
        document.body.style.overflow = "";
      }

      btn.addEventListener("click", () => {
        if (btn.disabled) return;
        const cityVal = city.value.trim();
        sessionStorage.setItem("evenName", name.value.trim());
        sessionStorage.setItem("evenMobile", mobile.value.trim());
        sessionStorage.setItem("evenCity", cityVal);

        if (!isBengaluru(cityVal)) {
          openModal(cityVal);
          return;
        }
        window.location.href = "otp.html";
      });

      document
        .getElementById("changeLocationBtn")
        .addEventListener("click", () => {
          closeModal();
          city.focus();
          city.select();
        });

      document.getElementById("notifyBtn").addEventListener("click", () => {
        // Capture the waitlist signup
        try {
          const record = {
            id:
              Math.random().toString(36).slice(2, 10) +
              Date.now().toString(36),
            timestamp: new Date().toISOString(),
            status: "waitlist_city",
            name: sessionStorage.getItem("evenName") || "",
            mobile: sessionStorage.getItem("evenMobile") || "",
            city: sessionStorage.getItem("evenCity") || "",
            insuranceSource: [],
            insurers: [],
            customInsurers: [],
            members: [],
          };
          const all = JSON.parse(
            localStorage.getItem("evenApplications") || "[]"
          );
          all.push(record);
          localStorage.setItem("evenApplications", JSON.stringify(all));
        } catch (err) {
          console.warn("Failed to persist waitlist:", err);
        }
        closeModal();
        toast.classList.add("shown");
        setTimeout(() => {
          toast.classList.remove("shown");
          setTimeout(() => (window.location.href = "index.html"), 350);
        }, 1500);
      });

      // Dismiss on overlay click (outside the sheet)
      modal.addEventListener("click", (e) => {
        if (e.target === modal) closeModal();
      });
    </script>
  </body>
