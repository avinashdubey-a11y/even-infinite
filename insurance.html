<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Insurance source — Even Infinite</title>
    <style>
      /* === Centra No2 web font family === */
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Hairline.otf") format("opentype"); font-weight: 100; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-HairlineItalic.otf") format("opentype"); font-weight: 100; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Thin.otf") format("opentype"); font-weight: 200; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-ThinItalic.otf") format("opentype"); font-weight: 200; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Light.otf") format("opentype"); font-weight: 300; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-LightItalic.otf") format("opentype"); font-weight: 300; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Book.otf") format("opentype"); font-weight: 400; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-BookItalic.otf") format("opentype"); font-weight: 400; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Medium.otf") format("opentype"); font-weight: 500; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-MediumItalic.otf") format("opentype"); font-weight: 500; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Bold.otf") format("opentype"); font-weight: 700; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-BoldItalic.otf") format("opentype"); font-weight: 700; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Extrabold.otf") format("opentype"); font-weight: 800; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-ExtraboldItalic.otf") format("opentype"); font-weight: 800; font-style: italic; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-Black.otf") format("opentype"); font-weight: 900; font-style: normal; font-display: swap; }
      @font-face { font-family: "Centra No2"; src: url("assets/fonts/CentraNo2-BlackItalic.otf") format("opentype"); font-weight: 900; font-style: italic; font-display: swap; }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background: #0a0c18;
        color: #fff;
        font-family: "Centra No2", "Inter", -apple-system, BlinkMacSystemFont,
          "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        display: flex;
        justify-content: center;
      }
      button,
      input {
        font-family: inherit;
      }
      button {
        border: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
        padding: 0;
      }
      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        position: relative;
        width: 100%;
        max-width: 100%;
        min-height: 100vh;
        background-image: linear-gradient(180deg, #111547 0%, #02041b 100%);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .head-blob {
        position: absolute;
        top: -60px;
        left: 50%;
        transform: translateX(-50%);
        width: 458px;
        height: 460px;
        pointer-events: none;
        background:
          radial-gradient(
            ellipse 55% 40% at 50% 30%,
            rgba(0, 85, 255, 0.55) 0%,
            rgba(0, 85, 255, 0) 65%
          ),
          radial-gradient(
            ellipse 35% 25% at 30% 45%,
            rgba(92, 130, 255, 0.32) 0%,
            rgba(92, 130, 255, 0) 70%
          );
        filter: blur(2px);
        z-index: 0;
      }

      /* Status bar */
      .status-bar {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px 0;
        z-index: 10;
      }
      .status-time {
        font-weight: 600;
        font-size: 14px;
        line-height: 22px;
        color: #fff;
      }
      .status-levels {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .content {
        position: relative;
        z-index: 1;
        padding: 24px 16px 120px;
        display: flex;
        flex-direction: column;
        gap: 32px;
        flex: 1;
      }

      /* Header row: back + Need help pill */
      .header-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 24px;
      }
      .back-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        cursor: pointer;
      }
      .need-help {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        height: 32px;
        padding: 0 14px;
        border-radius: 32px;
        border: 1.5px solid #fff;
        background: transparent;
        color: #fff;
        font-weight: 700;
        font-size: 13px;
        cursor: pointer;
      }

      .progress {
        display: flex;
        gap: 12px;
      }
      .progress-bar {
        flex: 1;
        height: 4px;
        border-radius: 20px;
        background: rgba(188, 213, 255, 0.16);
        position: relative;
        overflow: hidden;
      }
      .progress-bar.active {
        background: rgba(188, 213, 255, 0.56);
      }
      .progress-bar.active::after {
        content: "";
        position: absolute;
        inset: 0;
        background: #0055ff;
        border-radius: inherit;
      }

      .title-block {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .title-block h1 {
        margin: 0;
        font-weight: 700;
        font-size: 22px;
        line-height: 1.25;
        color: #fff;
      }
      .title-block .sub {
        margin: 0;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.56);
      }

      /* Option cards */
      .option-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .option {
        position: relative;
        background: #232543;
        border: 1px solid transparent;
        border-radius: 16px;
        padding: 16px 14px;
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        overflow: hidden;
        transition:
          border-color 0.15s ease,
          background 0.15s ease;
      }
      .option.selected {
        background: rgba(0, 85, 255, 0.18);
        border-color: #0055ff;
      }
      .option .checkbox {
        flex-shrink: 0;
        width: 22px;
        height: 22px;
        border: 1.5px solid rgba(157, 188, 255, 0.7);
        border-radius: 6px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: transparent;
        transition: all 0.15s ease;
      }
      .option.selected .checkbox {
        background: #0055ff;
        border-color: #0055ff;
      }
      .option .checkbox svg {
        opacity: 0;
        transition: opacity 0.15s ease;
      }
      .option.selected .checkbox svg {
        opacity: 1;
      }
      .option-text {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .option-text .t {
        font-weight: 700;
        font-size: 15px;
      }
      .option-text .s {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.6);
      }
      .option-art {
        width: 72px;
        height: 64px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .option-art img { width: 100%; height: 100%; object-fit: contain; }

      .no-insurance {
        align-self: center;
        margin-top: 4px;
        color: #5c82ff;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
      }

      /* Bottom bar */
      .bottom-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        width: auto;
        background: #040622;
        z-index: 50;
      }
      .bottom-bar-inner {
        padding: 16px;
      }
      .home-indicator-spacer {
        padding: 16px 16px 8px;
        display: flex;
        justify-content: center;
      }
      .home-indicator {
        width: 132.48px;
        height: 5px;
        background: #000;
        border-radius: 5px;
        opacity: 0;
      }

      .primary-btn {
        width: 100%;
        background: #0055ff;
        border: 0;
        border-radius: 32px;
        padding: 13px 20px;
        color: #fff;
        font-weight: 700;
        font-size: 16px;
        line-height: 1.5;
        cursor: pointer;
        opacity: 0.3;
        transition: opacity 0.18s ease;
      }
      .primary-btn.enabled {
        opacity: 1;
      }

      /* Modal */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(2, 4, 27, 0.55);
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
        display: none;
        align-items: flex-end;
        justify-content: center;
        z-index: 1000;
        padding: 0;
      }
      .modal-overlay.shown {
        display: flex;
      }
      .modal-sheet {
        position: relative;
        width: 100%;
        max-width: 360px;
        background: #1a1d3b;
        color: #fff;
        border-radius: 24px 24px 0 0;
        padding: 24px 20px 28px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        animation: sheetIn 0.22s ease-out both;
        border-top: 1px solid rgba(157, 188, 255, 0.18);
      }
      @keyframes sheetIn {
        from {
          transform: translateY(20px);
          opacity: 0.5;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .modal-close {
        position: absolute;
        top: 16px;
        right: 16px;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: transparent;
        border: 1.5px solid rgba(157, 188, 255, 0.5);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .modal-illustration {
        width: 80px;
        height: 80px;
      }
      .modal-title {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        color: #fff;
      }
      .modal-body {
        margin: 0;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.7);
        line-height: 1.45;
      }
      .modal-cta {
        width: 100%;
        margin-top: 8px;
        background: #0055ff;
        color: #fff;
        border: 0;
        border-radius: 32px;
        padding: 14px;
        font-weight: 700;
        font-size: 16px;
        cursor: pointer;
      }

      @media (min-width: 768px) {
        body {
          background:
            radial-gradient(
              ellipse at top,
              rgba(0, 85, 255, 0.08) 0%,
              transparent 50%
            ),
            #0a0c18;
          padding: 24px 0;
        .bottom-bar {
          left: 50%;
          right: auto;
          width: 360px;
          transform: translateX(-50%);
        }
      
        }
        .page {
          width: 360px;
          max-width: 360px;
          box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
          border-radius: 32px;
          min-height: calc(100vh - 48px);
        }
        .modal-overlay {
          align-items: center;
          padding: 24px;
        }
        .modal-sheet {
          border-radius: 24px;
          max-width: 320px;
        }
      }
    </style>
  </head>

    <!-- Health insurance required modal -->
    <div id="needInsModal" class="modal-overlay" role="dialog" aria-modal="true">
      <div class="modal-sheet">
        <button id="modalCloseBtn" class="modal-close" aria-label="Close" type="button">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path
              d="M2 2l6 6M8 2 2 8"
              stroke="#fff"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        </button>

        <span class="modal-illustration" aria-hidden="true">
          <svg viewBox="0 0 80 80" fill="none">
            <ellipse cx="20" cy="56" rx="8" ry="2" fill="#FFE3D8" />
            <ellipse cx="62" cy="56" rx="10" ry="2.5" fill="#FFE3D8" />
            <path
              d="M40 16c-9 0-16 7-16 15.7 0 11.2 14.4 26 15.4 27a1 1 0 0 0 1.5 0c1-1 15.4-15.8 15.4-27C56 23 49 16 40 16Z"
              fill="#FFD166"
              stroke="#1A1A1A"
              stroke-width="1.2"
            />
            <circle cx="40" cy="30" r="5" fill="#fff" stroke="#1A1A1A" stroke-width="1.2" />
            <circle cx="40" cy="30" r="2" fill="#1A1A1A" />
            <path d="M40 18v-4M40 14l-3-3M40 14l3-3" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="round" />
          </svg>
        </span>

        <h2 class="modal-title">Health insurance required</h2>
        <p class="modal-body">
          To activate Even Infinite, you'll need an active individual or
          corporate health insurance policy.
        </p>
        <button id="modalOkBtn" class="modal-cta" type="button">Okay, got it</button>
      </div>
    </div>

    <script>
      const options = Array.from(document.querySelectorAll(".option"));
      const continueBtn = document.getElementById("continueBtn");

      function refresh() {
        const any = options.some((o) => o.classList.contains("selected"));
        continueBtn.disabled = !any;
        continueBtn.classList.toggle("enabled", any);
      }

      options.forEach((o) => {
        o.addEventListener("click", (e) => {
          e.preventDefault();
          o.classList.toggle("selected");
          refresh();
        });
      });

      continueBtn.addEventListener("click", () => {
        if (continueBtn.disabled) return;
        const selected = options
          .filter((o) => o.classList.contains("selected"))
          .map((o) => o.dataset.value);
        sessionStorage.setItem("evenInsuranceSource", JSON.stringify(selected));
        window.location.href = "insurer.html";
      });

      // No insurance modal
      const modal = document.getElementById("needInsModal");
      function openModal() {
        modal.classList.add("shown");
        document.body.style.overflow = "hidden";
      }
      function closeModal() {
        modal.classList.remove("shown");
        document.body.style.overflow = "";
      }
      document
        .getElementById("noInsuranceBtn")
        .addEventListener("click", openModal);
      document
        .getElementById("modalOkBtn")
        .addEventListener("click", closeModal);
      document
        .getElementById("modalCloseBtn")
        .addEventListener("click", closeModal);
      modal.addEventListener("click", (e) => {
        if (e.target === modal) closeModal();
      });
    </script>
